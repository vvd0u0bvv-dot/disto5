<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disto Stable Controller</title>
</head>
<body>
    <button type="button" id="connectBtn">1. デバイス接続</button>
    <button type="button" id="measureBtn" disabled>2. 計測開始</button>
    <p id="status">ステータス: 未接続</p>
    <textarea id="result" rows="6" style="width: 100%;" readonly></textarea>

    <script>
        const SERVICE_UUID = '3ab10100-f831-4395-b29d-570977d5bf94';
        const CHAR_UUID = '3ab10120-f831-4395-b29d-570977d5bf94';
        
        let bleChar = null;
        let keepAliveTimer = null; // 接続維持タイマー

        document.getElementById('connectBtn').addEventListener('click', async () => {
            const status = document.getElementById('status');
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });
                
                status.innerText = '接続中...';
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bleChar = await service.getCharacteristic(CHAR_UUID);

                // 通知開始
                await bleChar.startNotifications();
                bleChar.addEventListener('characteristicvaluechanged', (e) => {
                    const val = new TextDecoder().decode(e.target.value);
                    document.getElementById('result').value += val + "\n";
                    status.innerText = '受信完了';
                });

                // 【重要】5秒ごとに空読みして接続をOSにアピールする（Keep-Alive）
                keepAliveTimer = setInterval(async () => {
                    if (bleChar && bleChar.service.device.gatt.connected) {
                        try { await bleChar.readValue(); } catch (e) {}
                    }
                }, 5000);

                status.innerText = '接続成功・接続維持中';
                document.getElementById('measureBtn').disabled = false;
                document.getElementById('connectBtn').disabled = true;
            } catch (e) {
                status.innerText = '接続エラー: ' + e.message;
            }
        });

        document.getElementById('measureBtn').addEventListener('click', async () => {
            if (!bleChar) return;
            const status = document.getElementById('status');
            
            try {
                status.innerText = '送信中...';
                // 10だけを送信（300は不要と判明）
                await bleChar.writeValue(new TextEncoder().encode("raiseEvent 10\r\n"));
                status.innerText = '計測リクエスト成功';
            } catch (e) {
                status.innerText = '切断されました: ' + e.message;
                if(keepAliveTimer) clearInterval(keepAliveTimer);
            }
        });
    </script>
</body>
</html>
