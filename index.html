<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disto Disconnect Prevention</title>
</head>
<body>
    <button type="button" id="connectBtn">1. デバイス接続</button>
    <button type="button" id="measureBtn" disabled>2. 計測開始（レーザー照射）</button>
    <p id="status">ステータス: 未接続</p>
    <textarea id="result" rows="6" style="width: 100%;" readonly placeholder="システムログ..."></textarea>

    <script>
        const SERVICE_UUID = '3ab10100-f831-4395-b29d-570977d5bf94';
        const CHAR_UUID_CMD = '3ab10120-f831-4395-b29d-570977d5bf94';
        
        let bleCharCmd = null;

        // ログ出力用関数
        const log = (msg) => {
            const resultArea = document.getElementById('result');
            resultArea.value += msg + '\n';
            resultArea.scrollTop = resultArea.scrollHeight; // 自動スクロール
            document.getElementById('status').innerText = msg;
        };

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                log('接続中...');
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });
                
                // 切断されたときのイベントリスナーを登録
                device.addEventListener('gattserverdisconnected', () => {
                    log('【警告】デバイスから切断されました');
                    document.getElementById('measureBtn').disabled = true;
                    document.getElementById('connectBtn').disabled = false;
                });

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                
                // 【重要】サービス内の「全て」のキャラクタリスティックを自動取得
                const characteristics = await service.getCharacteristics();
                
                for (const char of characteristics) {
                    // もし「通知（Notify/Indicate）」機能を持つものがあれば、全てダミー購読する
                    // これにより、Distoが「送信先がない」と怒って切断するのを防ぐ
                    if (char.properties.notify || char.properties.indicate) {
                        try {
                            await char.startNotifications();
                            // データが飛んできても何もせず破棄（Distoを安心させるため）
                            char.addEventListener('characteristicvaluechanged', () => {});
                            log(`通知ポート有効化: ${char.uuid.substring(4,8)}`);
                        } catch (err) {
                            console.warn('通知有効化スキップ:', err);
                        }
                    }
                    
                    // コマンド制作用（書き込み用）のキャラクタリスティックを保存
                    if (char.uuid === CHAR_UUID_CMD) {
                        bleCharCmd = char;
                    }
                }

                if (!bleCharCmd) {
                    throw new Error('コマンド用の通信口が見つかりません');
                }

                log('接続成功：計測準備完了（切断防止策適用済み）');
                document.getElementById('measureBtn').disabled = false;
                document.getElementById('connectBtn').disabled = true;
            } catch (e) {
                log('接続エラー: ' + e.message);
            }
        });

        document.getElementById('measureBtn').addEventListener('click', async () => {
            if (!bleCharCmd) return;
            
            try {
                log('計測シーケンス実行中...');
                document.getElementById('measureBtn').disabled = true;

                // PCアプリの解析通りの応答待ち + 約500msのディレイ
                const sendCommand = async (cmdStr) => {
                    const data = new TextEncoder().encode(cmdStr + "\r\n");
                    await bleCharCmd.writeValueWithResponse(data);
                };

                await sendCommand("raiseEvent 300");
                await new Promise(r => setTimeout(r, 500)); 

                await sendCommand("raiseEvent 10");
                await new Promise(r => setTimeout(r, 500)); 

                await sendCommand("raiseEvent 10");
                
                log('送信完了：レーザー照射確認中');
            } catch (e) {
                log('エラー: ' + e.message);
            } finally {
                // 連打防止のため、処理が終わったらボタンを再度有効化
                setTimeout(() => {
                    if (bleCharCmd && bleCharCmd.service.device.gatt.connected) {
                        document.getElementById('measureBtn').disabled = false;
                    }
                }, 1000);
            }
        });
    </script>
</body>
</html>
