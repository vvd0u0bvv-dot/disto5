<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disto BLE Controller</title>
</head>
<body>
    <button id="connectBtn">接続して計測</button>
    <p id="status">ステータス: 未接続</p>
    <input type="text" id="result" placeholder="計測結果待ち..." readonly>

    <script>
        const SERVICE_UUID = '3ab10100-f831-4395-b29d-570977d5bf94';
        const CHAR_UUID = '3ab10120-f831-4395-b29d-570977d5bf94';
        
        let bleServer = null; // 接続を保持するための変数

        document.getElementById('connectBtn').addEventListener('click', async () => {
            const status = document.getElementById('status');
            try {
                // 1. デバイス検索
                status.innerText = 'デバイス検索中...';
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });

                // 2. 接続確立
                status.innerText = 'GATT接続中...';
                bleServer = await device.gatt.connect();
                
                // 切断検知時の処理（iOSで重要）
                device.addEventListener('gattserverdisconnected', () => {
                    status.innerText = 'ステータス: 切断されました';
                    bleServer = null;
                });

                // 3. サービスとキャラクタリスティック取得
                const service = await bleServer.getPrimaryService(SERVICE_UUID);
                const char = await service.getCharacteristic(CHAR_UUID);

                // 4. 【重要】通知を有効化（これが切断を防ぐ鍵）
                await char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (event) => {
                    const value = new TextDecoder().decode(event.target.value);
                    document.getElementById('result').value = value;
                    status.innerText = 'ステータス: 受信完了';
                });

                // 5. コマンド送信
                status.innerText = 'コマンド送信中...';
                await char.writeValue(new TextEncoder().encode("raiseEvent 10\r\n"));
                status.innerText = 'ステータス: 接続中（待機中）';

            } catch (error) {
                console.error(error);
                status.innerText = 'エラー: ' + error.message;
            }
        });
    </script>
</body>
</html>
