<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disto Pro Controller</title>
</head>
<body>
    <button type="button" id="connectBtn">1. デバイス接続</button>
    <button type="button" id="measureBtn" disabled>2. 計測実行</button>
    <p id="status">ステータス: 未接続</p>
    <textarea id="result" rows="6" style="width: 100%;" readonly></textarea>

    <script>
        // 今回の解析で判明した重要情報を使用
        const SERVICE_UUID = '3ab10100-f831-4395-b29d-570977d5bf94';
        const CHAR_UUID = '3ab10120-f831-4395-b29d-570977d5bf94';
        
        let bleChar = null;

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bleChar = await service.getCharacteristic(CHAR_UUID);
                
                document.getElementById('status').innerText = '接続成功：シーケンス待機中';
                document.getElementById('measureBtn').disabled = false;
                document.getElementById('connectBtn').disabled = true;
            } catch (e) {
                document.getElementById('status').innerText = '接続エラー: ' + e.message;
            }
        });

        // 確実な通信のためのシーケンス送信関数
        async function sendCommandSequence() {
            const commands = ["raiseEvent 300", "raiseEvent 10", "raiseEvent 10"];
            
            for (const cmdStr of commands) {
                const data = new TextEncoder().encode(cmdStr + "\r\n");
                // 解析結果に基づき Write Request (with Response) を使用
                await bleChar.writeValueWithResponse(data);
                
                // コマンド間の微妙な間隔が、Distoのチップが切断を起こさないための鍵
                await new Promise(r => setTimeout(r, 100)); 
            }
        }

        document.getElementById('measureBtn').addEventListener('click', async () => {
            if (!bleChar) return;
            const status = document.getElementById('status');
            try {
                status.innerText = '計測シーケンス実行中...';
                await sendCommandSequence();
                status.innerText = '成功：デバイスからの応答を待機';
            } catch (e) {
                status.innerText = '通信エラー: ' + e.message;
                // エラー発生時は一度接続を見直す
            }
        });
    </script>
</body>
</html>
