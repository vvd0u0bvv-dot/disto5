<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disto Stability Controller</title>
</head>
<body>
    <button type="button" id="connectBtn">1. デバイス接続</button>
    <button type="button" id="measureBtn" disabled>2. 計測開始</button>
    <p id="status">ステータス: 未接続</p>
    <textarea id="result" rows="4" style="width: 100%;" readonly></textarea>

    <script>
        const SERVICE_UUID = '3ab10100-f831-4395-b29d-570977d5bf94';
        const CHAR_UUID = '3ab10120-f831-4395-b29d-570977d5bf94';
        
        let bleChar = null;

        document.getElementById('connectBtn').addEventListener('click', async () => {
            const status = document.getElementById('status');
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });
                
                status.innerText = '接続中...';
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bleChar = await service.getCharacteristic(CHAR_UUID);

                // 通知の監視を最優先する
                await bleChar.startNotifications();
                bleChar.addEventListener('characteristicvaluechanged', (e) => {
                    const val = new TextDecoder().decode(e.target.value);
                    document.getElementById('result').value += val + "\n";
                });

                status.innerText = '接続完了';
                document.getElementById('measureBtn').disabled = false;
            } catch (e) {
                status.innerText = '接続エラー: ' + e.message;
            }
        });

        document.getElementById('measureBtn').addEventListener('click', async () => {
            if (!bleChar) return;
            const status = document.getElementById('status');
            
            try {
                // 【重要】連続送信せず、まずは300だけを送る
                // 10を送ることで切断されるため、一旦除外してテストします
                status.innerText = '計測開始(300)送信中...';
                await bleChar.writeValue(new TextEncoder().encode("raiseEvent 300\r\n"));
                
                status.innerText = '成功（10は送信せず待機中）';
            } catch (e) {
                status.innerText = '切断されました: ' + e.message;
                console.error(e);
            }
        });
    </script>
</body>
</html>
