<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disto Distance Monitor</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f9; color: #333; }
        .tab-container { display: flex; border-bottom: 2px solid #ccc; margin-bottom: 20px; }
        .tab { padding: 12px 24px; cursor: pointer; border: 1px solid transparent; border-bottom: none; transition: 0.2s; }
        .tab.active { background-color: #fff; border-color: #ccc; border-bottom: 2px solid #fff; font-weight: bold; margin-bottom: -2px; color: #007bff; }
        .tab-content { display: none; background: #fff; padding: 25px; border: 1px solid #ccc; border-top: none; border-radius: 0 0 8px 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .tab-content.active { display: block; }
        
        .distance-display { font-size: 3rem; font-weight: bold; color: #007bff; text-align: center; margin: 20px 0; padding: 20px; background: #f0f7ff; border-radius: 10px; border: 2px dashed #007bff; }
        
        button { padding: 15px 20px; font-size: 16px; cursor: pointer; border-radius: 8px; border: none; background-color: #007bff; color: white; transition: 0.3s; width: 100%; margin-bottom: 10px; font-weight: bold; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        button:hover:not(:disabled) { background-color: #0056b3; }
        
        textarea { width: 100%; box-sizing: border-box; font-family: monospace; border-radius: 5px; border: 1px solid #ccc; padding: 10px; background: #fafafa; font-size: 12px; }
        #status { font-weight: bold; margin-bottom: 15px; padding: 10px; background: #e9ecef; border-radius: 6px; border-left: 5px solid #6c757d; }
    </style>
</head>
<body>

    <div id="status">ステータス: 未接続</div>

    <div class="tab-container">
        <div id="tab-setup" class="tab active" onclick="openTab('setup')">初期設定</div>
        <div id="tab-measurement" class="tab" onclick="openTab('measurement')">計測表示</div>
    </div>

    <div id="setup" class="tab-content active">
        <h3>1. 接続設定</h3>
        <p>「デバイスを接続」ボタンを押し、一覧からDisto D5を選択してください。</p>
        <button type="button" id="connectBtn">デバイスを接続する</button>
    </div>

    <div id="measurement" class="tab-content">
        <h3>2. リアルタイム計測</h3>
        <div class="distance-display" id="distDisplay">--- m</div>
        <button type="button" id="measureBtn" disabled>計測トリガー (10 x 2回)</button>
        <p style="font-size: 0.9em; color: #666;">※計測が完了すると、自動的に上の数値が更新されます。</p>
    </div>

    <hr style="margin-top: 30px; border: 0; border-top: 1px solid #eee;">
    <h4 style="margin-bottom: 10px;">システムログ</h4>
    <textarea id="result" rows="8" readonly placeholder="通信ログが表示されます..."></textarea>

    <script>
        const SERVICE_UUID = '3ab10100-f831-4395-b29d-570977d5bf94';
        const DIST_CHAR_UUID = '3ab1010d-f831-4395-b29d-570977d5bf94';
        
        let bleCharCmd = null;

        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            // クリックされたタブをactiveにする
            if(tabId === 'setup') document.getElementById('tab-setup').classList.add('active');
            if(tabId === 'measurement') document.getElementById('tab-measurement').classList.add('active');
        }

        const log = (msg) => {
            const area = document.getElementById('result');
            area.value += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
            area.scrollTop = area.scrollHeight;
            document.getElementById('status').innerText = `ステータス: ${msg}`;
        };

        // 距離データ受信時の処理 (Indication)
        function handleDistChange(event) {
            const value = event.target.value;
            // Distoのデータ形式に合わせてデコード（通常はFloat32や文字列）
            // まずは生データを16進数と文字列の両方でデバッグ表示
            const decoder = new TextDecoder();
            const decodedString = decoder.decode(value);
            
            log(`データ受信: ${decodedString}`);
            
            // UIに表示（数値のみ抽出するなどの加工が必要な場合があります）
            document.getElementById('distDisplay').innerText = decodedString.trim() + " m";
        }

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                log('Bluetoothデバイスを探索中...');
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });
                
                device.addEventListener('gattserverdisconnected', () => {
                    log('切断されました');
                    document.getElementById('measureBtn').disabled = true;
                    document.getElementById('connectBtn').disabled = false;
                });

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                const characteristics = await service.getCharacteristics();
                
                for (const char of characteristics) {
                    // 1. コマンド書き込み用 (Write)
                    if (char.properties.write || char.properties.writeWithoutResponse) {
                        bleCharCmd = char;
                        log(`コマンド口確保: ${char.uuid.substring(4, 8)}`);
                    }

                    // 2. 距離データ受信用 (Indication)
                    if (char.uuid === DIST_CHAR_UUID) {
                        log(`距離データ口(010d)の待機を開始...`);
                        await char.startNotifications();
                        char.addEventListener('characteristicvaluechanged', handleDistChange);
                    } else if (char.properties.notify || char.properties.indicate) {
                        // それ以外の通知ポートも切断防止のために有効化だけしておく
                        try {
                            await char.startNotifications();
                            char.addEventListener('characteristicvaluechanged', () => {});
                        } catch(e) {}
                    }
                }

                if (!bleCharCmd) throw new Error('書き込み可能な口が見つかりません');
                
                document.getElementById('measureBtn').disabled = false;
                document.getElementById('connectBtn').disabled = true;
                log('すべての準備が完了しました！');
                
                setTimeout(() => openTab('measurement'), 800);

            } catch (e) {
                log('エラー: ' + e.message);
            }
        });

        document.getElementById('measureBtn').addEventListener('click', async () => {
            if (!bleCharCmd) return;
            try {
                log('計測トリガー送信中...');
                
                const send = async () => {
                    const data = new TextEncoder().encode("raiseEvent 10\r\n");
                    await bleCharCmd.writeValueWithResponse(data);
                };

                await send();
                await new Promise(r => setTimeout(r, 500));
                await send();
                
                log('送信完了。デバイスの応答を待っています...');

            } catch (e) {
                log('送信エラー: ' + e.message);
            }
        });
    </script>
</body>
</html>
