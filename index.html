<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disto BLE Controller</title>
</head>
<body>
    <div style="margin-bottom: 20px;">
        <button id="connectBtn" style="padding: 15px;">1. デバイス接続</button>
        <button id="measureBtn" style="padding: 15px;" disabled>2. 計測開始</button>
    </div>
    
    <p id="status">ステータス: 未接続</p>
    <input type="text" id="result" placeholder="計測結果..." readonly>

    <script>
        const SERVICE_UUID = '3ab10100-f831-4395-b29d-570977d5bf94';
        const CHAR_UUID = '3ab10120-f831-4395-b29d-570977d5bf94';
        
        let bleChar = null; // キャラクタリスティックを保持

        // 1. 接続ボタンの処理
        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });
                
                document.getElementById('status').innerText = '接続中...';
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bleChar = await service.getCharacteristic(CHAR_UUID);

                // 通知の有効化（接続維持に必須）
                await bleChar.startNotifications();
                bleChar.addEventListener('characteristicvaluechanged', (event) => {
                    const value = new TextDecoder().decode(event.target.value);
                    document.getElementById('result').value = value;
                    document.getElementById('status').innerText = '受信完了';
                });

                document.getElementById('status').innerText = '接続成功！計測可能です';
                document.getElementById('measureBtn').disabled = false;
                document.getElementById('connectBtn').disabled = true;

            } catch (error) {
                document.getElementById('status').innerText = 'エラー: ' + error.message;
            }
        });

        // 2. 計測ボタンの処理
        document.getElementById('measureBtn').addEventListener('click', async () => {
            if (!bleChar) return;
            try {
                document.getElementById('status').innerText = '計測指令送信中...';
                await bleChar.writeValue(new TextEncoder().encode("raiseEvent 10\r\n"));
            } catch (error) {
                document.getElementById('status').innerText = '計測エラー: ' + error.message;
            }
        });
    </script>
</body>
</html>
