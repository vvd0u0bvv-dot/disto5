<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disto Pro - UI Optimized</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background: #fff; }
        .tabs { display: flex; border-bottom: 2px solid #ccc; margin-bottom: 20px; }
        .tab { padding: 15px 30px; cursor: pointer; border: 1px solid #ccc; border-bottom: none; background: #eee; }
        .tab.active { background: #fff; font-weight: bold; border-top: 2px solid #007bff; }
        .content { display: none; }
        .content.active { display: block; }

        .btn-connect { background: #00bfff; color: white; padding: 20px; width: 100%; border: none; font-size: 1.2rem; margin-bottom: 20px; }
        .btn-measure { background: #9acd32; color: black; padding: 40px; width: 100%; border: none; font-size: 2rem; font-weight: bold; }
        
        /* 差分表示用のスタイル */
        .val-display { font-size: 5rem; font-weight: bold; text-align: center; margin: 20px 0; }
        .warning { background: red; color: white; padding: 20px; text-align: center; font-size: 1.5rem; font-weight: bold; display: none; margin-bottom: 10px; }
        
        .info-panel { border: 1px solid #333; padding: 20px; }
    </style>
</head>
<body>

    <div class="tabs">
        <div id="tab-setup" class="tab active" onclick="switchTab('setup')">初期設定</div>
        <div id="tab-measure" class="tab" onclick="switchTab('measure')">計測</div>
    </div>

    <div id="setup" class="content active">
        <button class="btn-connect" onclick="connect()">レーザー距離計と接続</button>
        <div class="info-panel">
            <h3>記録されている値</h3>
            <p>斜距離: <span id="savedDist">0.0000</span> m</p>
            <p>角度: <span id="savedAngle">0.00</span> °</p>
            <p>水平距離: <span id="savedHoriz">0.0000</span> m</p>
        </div>
        <button class="btn-measure" style="margin-top:20px;" onclick="triggerSetup()">初期値として計測</button>
    </div>

    <div id="measure" class="content">
        <div id="warning-box" class="warning">⚠ 治具ズレ検知</div>
        <div class="val-display"><span id="diffDisplay">0.00</span> cm</div>
        <button class="btn-measure" onclick="triggerMeasure()">計測</button>
    </div>

    <script>
        let bleCharCmd = null;
        let isSaving = false;

        function switchTab(id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('tab-' + id).classList.add('active');
        }

        window.onload = () => {
            document.getElementById('savedDist').innerText = localStorage.getItem('d') || '0.0000';
            document.getElementById('savedAngle').innerText = localStorage.getItem('a') || '0.00';
            document.getElementById('savedHoriz').innerText = localStorage.getItem('h') || '0.0000';
        };

        async function handleData(event) {
            const val = event.target.value;
            const dist = val.getFloat32(0, true);
            const rad = val.getFloat32(4, true);
            const deg = rad * (180 / Math.PI);
            const horiz = dist * Math.cos(rad);

            if (isSaving) {
                localStorage.setItem('d', dist.toFixed(4));
                localStorage.setItem('a', deg.toFixed(2));
                localStorage.setItem('h', horiz.toFixed(4));
                document.getElementById('savedDist').innerText = dist.toFixed(4);
                document.getElementById('savedAngle').innerText = deg.toFixed(2);
                document.getElementById('savedHoriz').innerText = horiz.toFixed(4);
                isSaving = false;
            }

            const savedH = parseFloat(localStorage.getItem('h') || 0);
            const savedA = parseFloat(localStorage.getItem('a') || 0);
            
            // 差分をcmで表示（小数点第2位まで）
            document.getElementById('diffDisplay').innerText = ((horiz - savedH) * 100).toFixed(2);
            document.getElementById('warning-box').style.display = (Math.abs(deg - savedA) >= 2) ? 'block' : 'none';
        }

        async function connect() {
            try {
                const device = await navigator.bluetooth.requestDevice({ filters: [{ services: ['3ab10100-f831-4395-b29d-570977d5bf94'] }] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('3ab10100-f831-4395-b29d-570977d5bf94');
                const chars = await service.getCharacteristics();
                for (const c of chars) {
                    if (c.properties.notify) { await c.startNotifications(); c.addEventListener('characteristicvaluechanged', handleData); }
                    if (c.properties.write) bleCharCmd = c;
                }
                alert('接続完了');
            } catch (e) { alert(e); }
        }

        async function triggerSetup() { 
            isSaving = true; 
            await bleCharCmd.writeValue(new TextEncoder().encode("raiseEvent 10\r\n")); 
        }
        
        async function triggerMeasure() { 
            const cmd = new TextEncoder().encode("raiseEvent 10\r\n");
            await bleCharCmd.writeValue(cmd);
            await new Promise(r=>setTimeout(r,500));
            await bleCharCmd.writeValue(cmd);
        }
    </script>
</body>
</html>
