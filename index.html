<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disto Write-Only (Minimalist)</title>
</head>
<body>
    <button type="button" id="connectBtn">1. デバイス接続</button>
    <button type="button" id="measureBtn" disabled>2. 計測開始</button>
    <p id="status">ステータス: 未接続</p>
    <textarea id="result" rows="4" style="width: 100%;" readonly></textarea>

    <script>
        const SERVICE_UUID = '3ab10100-f831-4395-b29d-570977d5bf94';
        const CHAR_UUID = '3ab10120-f831-4395-b29d-570977d5bf94';
        
        let bleChar = null;

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });
                
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bleChar = await service.getCharacteristic(CHAR_UUID);

                document.getElementById('status').innerText = '接続成功：送信待機中';
                document.getElementById('measureBtn').disabled = false;
                document.getElementById('connectBtn').disabled = true;
            } catch (e) {
                document.getElementById('status').innerText = '接続エラー: ' + e.message;
            }
        });

        document.getElementById('measureBtn').addEventListener('click', async () => {
            if (!bleChar) return;
            try {
                document.getElementById('status').innerText = 'コマンド送信中...';
                
                // 【重要】Responseを待たない送信（Write Without Response）
                // これによりiOSのGATT競合による切断を回避します
                const cmd = new TextEncoder().encode("raiseEvent 10\r\n");
                await bleChar.writeValueWithoutResponse(cmd);
                
                document.getElementById('status').innerText = '送信完了（応答待機なし）';
            } catch (e) {
                document.getElementById('status').innerText = '通信エラー: ' + e.message;
            }
        });
    </script>
</body>
</html>
