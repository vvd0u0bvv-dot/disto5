<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disto BLE Controller</title>
</head>
<body>
    <button id="connectBtn">1. デバイス接続</button>
    <button id="measureBtn" disabled>2. 計測開始</button>
    <p id="status">ステータス: 未接続</p>
    <input type="text" id="result" placeholder="計測結果...">

    <script>
        const SERVICE_UUID = '3ab10100-f831-4395-b29d-570977d5bf94';
        const CHAR_UUID = '3ab10120-f831-4395-b29d-570977d5bf94';
        
        // 【重要】オブジェクトをグローバルに保持し、ガベージコレクションを防ぐ
        let bleDevice = null;
        let bleChar = null;

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                // 1. デバイス検索
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });

                // 切断検知のリスナーを設定
                bleDevice.addEventListener('gattserverdisconnected', () => {
                    document.getElementById('status').innerText = 'ステータス: 切断されました';
                    document.getElementById('measureBtn').disabled = true;
                });

                document.getElementById('status').innerText = 'GATT接続中...';
                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bleChar = await service.getCharacteristic(CHAR_UUID);

                // 2. 通知の有効化 (接続維持に必須)
                await bleChar.startNotifications();
                bleChar.addEventListener('characteristicvaluechanged', (event) => {
                    const value = new TextDecoder().decode(event.target.value);
                    document.getElementById('result').value = value;
                    document.getElementById('status').innerText = '受信完了';
                });

                document.getElementById('status').innerText = '接続成功！計測可能';
                document.getElementById('measureBtn').disabled = false;
            } catch (error) {
                document.getElementById('status').innerText = 'エラー: ' + error.message;
            }
        });

        document.getElementById('measureBtn').addEventListener('click', async () => {
            if (!bleChar) return;
            try {
                // 計測コマンド送信
                await bleChar.writeValue(new TextEncoder().encode("raiseEvent 10\r\n"));
            } catch (error) {
                document.getElementById('status').innerText = '送信エラー: ' + error.message;
            }
        });
    </script>
</body>
</html>
