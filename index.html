<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disto Simple Controller</title>
</head>
<body>
    <button type="button" id="connectBtn">1. デバイス接続</button>
    <button type="button" id="measureBtn" disabled>2. 計測開始</button>
    <p id="status">ステータス: 未接続</p>
    <textarea id="result" rows="4" style="width: 100%;" placeholder="計測結果..."></textarea>

    <script>
        const SERVICE_UUID = '3ab10100-f831-4395-b29d-570977d5bf94';
        const CHAR_UUID = '3ab10120-f831-4395-b29d-570977d5bf94';
        
        let bleChar = null;

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });
                
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bleChar = await service.getCharacteristic(CHAR_UUID);

                await bleChar.startNotifications();
                bleChar.addEventListener('characteristicvaluechanged', (e) => {
                    const val = new TextDecoder().decode(e.target.value);
                    document.getElementById('result').value += val + "\n";
                    document.getElementById('status').innerText = '受信完了';
                });

                document.getElementById('status').innerText = '接続成功';
                document.getElementById('measureBtn').disabled = false;
            } catch (e) {
                document.getElementById('status').innerText = 'エラー: ' + e.message;
            }
        });

        document.getElementById('measureBtn').addEventListener('click', async () => {
            if (!bleChar) return;
            try {
                document.getElementById('status').innerText = '送信中...';
                // 10だけを送信する（これが成功の鍵）
                await bleChar.writeValue(new TextEncoder().encode("raiseEvent 10\r\n"));
                document.getElementById('status').innerText = '送信成功';
            } catch (e) {
                document.getElementById('status').innerText = '切断されました: ' + e.message;
            }
        });
    </script>
</body>
</html>
