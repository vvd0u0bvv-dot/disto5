<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disto Double-Trigger Controller</title>
</head>
<body>
    <button type="button" id="connectBtn">1. デバイス接続</button>
    <button type="button" id="measureBtn" disabled>2. 計測シーケンス実行 (10 x 2)</button>
    <p id="status">ステータス: 未接続</p>
    <textarea id="result" rows="8" style="width: 100%;" readonly></textarea>

    <script>
        const SERVICE_UUID = '3ab10100-f831-4395-b29d-570977d5bf94';
        let bleCharCmd = null;

        const log = (msg) => {
            const area = document.getElementById('result');
            area.value += msg + '\n';
            area.scrollTop = area.scrollHeight;
            document.getElementById('status').innerText = msg;
        };

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                log('接続中...');
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });
                
                device.addEventListener('gattserverdisconnected', () => log('切断されました'));

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                const characteristics = await service.getCharacteristics();
                
                for (const char of characteristics) {
                    // 書き込み可能な口を自動確保
                    if (char.properties.write || char.properties.writeWithoutResponse) {
                        bleCharCmd = char;
                        log(`★ コマンド通信口確保: ${char.uuid.substring(4, 8)}`);
                    }
                    // 接続維持用のダミー通知購読
                    if (char.properties.notify || char.properties.indicate) {
                        try {
                            await char.startNotifications();
                            char.addEventListener('characteristicvaluechanged', () => {});
                        } catch(e) {}
                    }
                }

                if (!bleCharCmd) throw new Error('書き込み可能な口が見つかりません');
                document.getElementById('measureBtn').disabled = false;
                document.getElementById('connectBtn').disabled = true;
                log('準備完了');
            } catch (e) {
                log('エラー: ' + e.message);
            }
        });

        document.getElementById('measureBtn').addEventListener('click', async () => {
            if (!bleCharCmd) return;
            try {
                log('シーケンス開始 (raiseEvent 10 x 2)...');
                
                const send = async () => {
                    const data = new TextEncoder().encode("raiseEvent 10\r\n");
                    await bleCharCmd.writeValueWithResponse(data);
                };

                // 1回目送信
                await send();
                log('1回目送信完了');
                
                // 500ms待機
                await new Promise(r => setTimeout(r, 700));
                
                // 2回目送信
                await send();
                log('2回目送信完了：計測開始');

            } catch (e) {
                log('送信エラー: ' + e.message);
            }
        });
    </script>
</body>
</html>
