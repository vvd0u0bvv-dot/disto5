<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disto Stable Controller</title>
</head>
<body>
    <button type="button" id="connectBtn">1. デバイス接続</button>
    <button type="button" id="measureBtn" disabled>2. 計測開始</button>
    <p id="status">ステータス: 未接続</p>
    <textarea id="result" rows="4" style="width: 100%;" placeholder="計測結果..."></textarea>

    <script>
        const SERVICE_UUID = '3ab10100-f831-4395-b29d-570977d5bf94';
        const CHAR_UUID = '3ab10120-f831-4395-b29d-570977d5bf94';
        
        let bleChar = null;

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });
                
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bleChar = await service.getCharacteristic(CHAR_UUID);

                document.getElementById('status').innerText = '接続成功';
                document.getElementById('measureBtn').disabled = false;
                document.getElementById('connectBtn').disabled = true;
            } catch (e) {
                document.getElementById('status').innerText = '接続エラー: ' + e.message;
            }
        });

        document.getElementById('measureBtn').addEventListener('click', async () => {
            if (!bleChar) return;
            const status = document.getElementById('status');
            
            try {
                status.innerText = '計測開始リクエスト中...';
                
                // 1. レーザー起動用コマンド送信
                const cmd = new TextEncoder().encode("raiseEvent 10\r\n");
                await bleChar.writeValueWithResponse(cmd);
                
                // 2. 計測直後の「接続断」を防ぐためのダミー読み込み
                // これにより、通信経路が「アクティブ」であるとOSに認識させ続けます
                status.innerText = '計測中・通信維持待機...';
                
                // 少しだけ待ってから状態を確認することで切断を防ぐ
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                try {
                    await bleChar.readValue(); // 空読みして接続を叩き起こす
                } catch(e) {
                    // 読み込み不可の場合でも切断しないよう無視
                }
                
                status.innerText = '計測・通信維持完了';
            } catch (e) {
                status.innerText = '切断されました: ' + e.message;
            }
        });
    </script>
</body>
</html>
