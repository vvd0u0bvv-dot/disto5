<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disto Auto-Connect Controller</title>
</head>
<body>
    <button type="button" id="connectBtn">デバイス初期接続</button>
    <button type="button" id="measureBtn" disabled>計測開始</button>
    <p id="status">ステータス: 未接続</p>
    <textarea id="result" rows="4" style="width: 100%;" readonly></textarea>

    <script>
        const SERVICE_UUID = '3ab10100-f831-4395-b29d-570977d5bf94';
        const CHAR_UUID = '3ab10120-f831-4395-b29d-570977d5bf94';
        
        let bleDevice = null;
        let bleChar = null;

        // 接続を確保する汎用関数
        async function ensureConnection() {
            // デバイスが存在しない、または切断されている場合は再接続
            if (!bleDevice || !bleDevice.gatt.connected) {
                document.getElementById('status').innerText = '再接続中...';
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });
                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bleChar = await service.getCharacteristic(CHAR_UUID);
                
                await bleChar.startNotifications();
                bleChar.addEventListener('characteristicvaluechanged', (e) => {
                    const val = new TextDecoder().decode(e.target.value);
                    document.getElementById('result').value += val + "\n";
                });
            }
        }

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                await ensureConnection();
                document.getElementById('status').innerText = '接続完了';
                document.getElementById('measureBtn').disabled = false;
            } catch (e) {
                document.getElementById('status').innerText = 'エラー: ' + e.message;
            }
        });

        document.getElementById('measureBtn').addEventListener('click', async () => {
            try {
                // 計測のたびに接続を確認
                await ensureConnection();
                
                document.getElementById('status').innerText = '送信中...';
                await bleChar.writeValue(new TextEncoder().encode("raiseEvent 10\r\n"));
                document.getElementById('status').innerText = '受信待機中';
            } catch (e) {
                document.getElementById('status').innerText = '切断されました: ' + e.message;
            }
        });
    </script>
</body>
</html>
