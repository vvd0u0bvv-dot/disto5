<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disto Timing Sync Controller</title>
</head>
<body>
    <button type="button" id="connectBtn">1. デバイス接続</button>
    <button type="button" id="measureBtn" disabled>2. 計測開始</button>
    <p id="status">ステータス: 未接続</p>
    <textarea id="result" rows="6" style="width: 100%;" readonly placeholder="計測結果待ち..."></textarea>

    <script>
        const SERVICE_UUID = '3ab10100-f831-4395-b29d-570977d5bf94';
        const CHAR_UUID = '3ab10120-f831-4395-b29d-570977d5bf94';
        let bleChar = null;

        document.getElementById('connectBtn').addEventListener('click', async () => {
            const status = document.getElementById('status');
            try {
                status.innerText = '接続中...';
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bleChar = await service.getCharacteristic(CHAR_UUID);
                
                status.innerText = '接続成功：シーケンス待機中';
                document.getElementById('measureBtn').disabled = false;
                document.getElementById('connectBtn').disabled = true;
            } catch (e) {
                status.innerText = '接続エラー: ' + e.message;
            }
        });

        document.getElementById('measureBtn').addEventListener('click', async () => {
            if (!bleChar) return;
            const status = document.getElementById('status');
            
            try {
                status.innerText = '計測シーケンス実行中...';

                // PCアプリのログ通り、Responseを待ちつつ、十分な間隔を空ける
                const sendCommand = async (cmdStr) => {
                    const data = new TextEncoder().encode(cmdStr + "\r\n");
                    await bleChar.writeValueWithResponse(data);
                };

                // 1. 初期化コマンド
                await sendCommand("raiseEvent 300");
                // 解析結果に基づく約500msの待機
                await new Promise(r => setTimeout(r, 500)); 

                // 2. 計測準備コマンド
                await sendCommand("raiseEvent 10");
                // 解析結果に基づく約500msの待機
                await new Promise(r => setTimeout(r, 500)); 

                // 3. 計測実行コマンド
                await sendCommand("raiseEvent 10");
                
                status.innerText = '送信完了：レーザー照射・接続維持中';
            } catch (e) {
                status.innerText = 'エラー: ' + e.message;
            }
        });
    </script>
</body>
</html>
