<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disto Pro - UI Optimized</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background: #fff; }
        .tabs { display: flex; border-bottom: 2px solid #ccc; margin-bottom: 20px; }
        .tab { padding: 15px 30px; cursor: pointer; border: 1px solid #ccc; border-bottom: none; background: #eee; }
        .tab.active { background: #fff; font-weight: bold; border-top: 2px solid #007bff; }
        .content { display: none; }
        .content.active { display: block; }

        .btn-connect { background: #00bfff; color: white; padding: 20px; width: 100%; border: none; font-size: 1.2rem; margin-bottom: 20px; }
        .btn-measure { background: #9acd32; color: black; padding: 40px; width: 100%; border: none; font-size: 2rem; font-weight: bold; }
        
        .val-display { font-size: 5rem; font-weight: bold; text-align: center; margin: 20px 0; }
        .warning { background: red; color: white; padding: 20px; text-align: center; font-size: 1.5rem; font-weight: bold; display: none; margin-bottom: 10px; }
        
        .info-panel { border: 1px solid #333; padding: 20px; }
    </style>
</head>
<body>

    <div class="tabs">
        <div id="tab-setup" class="tab active" onclick="switchTab('setup')">初期設定</div>
        <div id="tab-measure" class="tab" onclick="switchTab('measure')">計測</div>
    </div>

    <div id="setup" class="content active">
        <button class="btn-connect" id="connectBtn">レーザー距離計と接続</button>
        <div class="info-panel">
            <h3>記録されている値</h3>
            <p>斜距離: <span id="savedDist">---</span> m</p>
            <p>角度: <span id="savedAngle">---</span> °</p>
            <p><strong>水平距離: <span id="savedHoriz">---</span> m</strong></p>
        </div>
        <button class="btn-measure" id="measureSetupBtn" style="margin-top:20px;" disabled>初期値として計測</button>
    </div>

    <div id="measure" class="content">
        <div id="warning-box" class="warning">⚠ 治具ズレ検知</div>
        <div class="val-display"><span id="diffDisplay">---</span> cm</div>
        <button class="btn-measure" id="measureBtn" disabled>計測</button>
    </div>

    <script>
        // 動作確認済みのロジックをそのまま使用
        const DIST_SHORT_UUID = '010d';
        let bleCharCmd = null;
        let isSaving = false;

        function switchTab(id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('tab-' + id).classList.add('active');
        }

        window.onload = () => {
            document.getElementById('savedDist').innerText = localStorage.getItem('disto_dist') || '---';
            document.getElementById('savedAngle').innerText = localStorage.getItem('disto_angle') || '---';
            document.getElementById('savedHoriz').innerText = localStorage.getItem('disto_horiz') || '---';
        };

        function handleData(event) {
            const value = event.target.value;
            if (event.target.uuid.toLowerCase().includes(DIST_SHORT_UUID)) {
                const dist = value.getFloat32(0, true);
                const angleRad = value.getFloat32(4, true);
                const angleDeg = angleRad * (180 / Math.PI);
                const horizDist = dist * Math.cos(angleRad);

                const savedH = parseFloat(localStorage.getItem('disto_horiz'));
                const savedA = parseFloat(localStorage.getItem('disto_angle'));

                if (!isNaN(savedH)) document.getElementById('diffDisplay').innerText = ((horizDist - savedH) * 100).toFixed(2);
                document.getElementById('warning-box').style.display = (!isNaN(savedA) && Math.abs(angleDeg - savedA) >= 2.0) ? 'block' : 'none';

                if (isSaving) {
                    localStorage.setItem('disto_dist', dist.toFixed(4));
                    localStorage.setItem('disto_angle', angleDeg.toFixed(2));
                    localStorage.setItem('disto_horiz', horizDist.toFixed(4));
                    document.getElementById('savedDist').innerText = dist.toFixed(4);
                    document.getElementById('savedAngle').innerText = angleDeg.toFixed(2);
                    document.getElementById('savedHoriz').innerText = horizDist.toFixed(4);
                    isSaving = false;
                }
            }
        }

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({ filters: [{ services: ['3ab10100-f831-4395-b29d-570977d5bf94'] }] });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('3ab10100-f831-4395-b29d-570977d5bf94');
                const chars = await service.getCharacteristics();
                for (const c of chars) {
                    if (c.properties.notify || c.properties.indicate) { await c.startNotifications(); c.addEventListener('characteristicvaluechanged', handleData); }
                    if (c.properties.write || c.properties.writeWithoutResponse) bleCharCmd = c;
                }
                document.getElementById('measureBtn').disabled = false;
                document.getElementById('measureSetupBtn').disabled = false;
                alert('接続完了');
            } catch (e) { alert('Error: ' + e.message); }
        });

        const executeMeasure = async (saveMode) => {
            if (!bleCharCmd) return;
            isSaving = saveMode;
            const cmd = new TextEncoder().encode("raiseEvent 10\r\n");
            await bleCharCmd.writeValueWithResponse(cmd);
            if (!saveMode) { await new Promise(r => setTimeout(r, 500)); await bleCharCmd.writeValueWithResponse(cmd); }
        };

        document.getElementById('measureBtn').addEventListener('click', () => executeMeasure(false));
        document.getElementById('measureSetupBtn').addEventListener('click', () => executeMeasure(true));
    </script>
</body>
</html>
